<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tmux Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #58a6ff;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 1rem;
            color: #c9d1d9;
        }

        .btn {
            background: #238636;
            color: #ffffff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2ea043;
        }

        .btn-danger {
            background: #da3633;
        }

        .btn-danger:hover {
            background: #f85149;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .session-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .session-item:hover {
            border-color: #58a6ff;
            background: #161b22;
        }

        .session-item.active {
            border-color: #58a6ff;
            background: #161b22;
        }

        .session-name {
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 0.25rem;
        }

        .session-info {
            font-size: 0.75rem;
            color: #8b949e;
        }

        .session-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .terminal-container {
            flex: 1;
            background: #000;
            padding: 1rem;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            width: 400px;
            max-width: 90%;
        }

        .modal-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #c9d1d9;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #8b949e;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.5rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .btn-secondary {
            background: #30363d;
            color: #c9d1d9;
        }

        .btn-secondary:hover {
            background: #484f58;
        }

        .empty-state {
            padding: 2rem;
            text-align: center;
            color: #8b949e;
        }

        .no-session {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #8b949e;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Tmux Portal</h1>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Sessions</h2>
                <button class="btn" onclick="showCreateModal()">+ New</button>
            </div>
            <div class="session-list" id="sessionList">
                <!-- Sessions will be populated here -->
            </div>
        </div>

        <div class="terminal-container">
            <div id="terminal"></div>
            <div class="no-session" id="noSessionMessage">
                Select a session to connect
            </div>
        </div>
    </div>

    <!-- Create Session Modal -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">Create New Session</div>
            <div class="form-group">
                <label for="sessionName">Session Name</label>
                <input type="text" id="sessionName" placeholder="my-session" autofocus>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideCreateModal()">Cancel</button>
                <button class="btn" onclick="createSession()">Create</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=9"></script>
</body>
</html>
